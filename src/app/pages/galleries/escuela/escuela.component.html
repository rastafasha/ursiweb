<section class="sub-header shop-layout-1">
    <img class="rellax bg-overlay" src="./assets/images/sub-header/escuela2.jpg"
        alt="ursi galletti taller escuela orfebreria">
    <div class="overlay-call-to-action"></div>
    <h3 class="heading-style-3"> {{'Escuela y Ursi Galletti'|translate}}</h3>
</section>

<app-loading *ngIf="isLoading"></app-loading>
<section class="boxed-sm" id="info" *ngIf="!isLoading">
    <div class="container ">
        <div class="masonry">
            <div class=" item" *ngFor="let escuela of escuelas">
                <a [href]="escuela.avatar | imagenPipe: 'galleryschools'" data-gallery title="">
                    <img [src]="escuela.avatar | imagenPipe: 'galleryschools'"
                        alt="ursi galletti taller escuela orfebreria" width="92" height="100" border="0"
                        class="pin" /></a>
            </div>
        </div>
    </div>
</section>
