<figure class="item ">
    <div class="product product-style-1">
        <div class="img-wrapper">
            <div class="image-container">
                <a class="js-quick-view cursor" type="button" (click)="openModal()">
                    <img class="img-responsive" [src]="product.avatar | imagenPipe: 'cursos'" width="100%"
                        alt="ursi galletti taller escuela orfebreria {{product.name}}" />
                </a>
            </div>

            <!-- <div class="product-control-wrapper bottom-right">
                <div class="wrapper-control-item">
                    <a class="js-quick-view cursor" type="button" (click)="openModal()">
                        <span class="lnr lnr-eye"></span>
                    </a>
                </div>
            </div> -->
        </div>
        <figcaption class="desc">
            <h3>{{translate.currentLang === 'en' ? product.name_eng : product.name | slice:0:30}}...</h3>
            <p class="price">{{product.price | currency}}</p><br>
            <div *ngIf="user">
                <button class="btn btn-outline-ursi" (click)="addToCart()"> <i class="fa fa-shopping-cart"></i></button>
            </div>
        </figcaption>
    </div>
</figure>
